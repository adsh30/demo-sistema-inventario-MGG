<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGG · Sistema</title>
  <link rel="icon" type="image/jpeg" href="../public/image.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../src/shared/styles/theme.css" />
  <link rel="stylesheet" href="../src/shared/styles/app-shell.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-brand">
        <a href="#/dashboard" class="brand">
          <img src="../public/image.jpeg" alt="Mineral Group Guayana" />
          <div class="brand-text"><strong>MGG</strong><small>Inventarios</small></div>
        </a>
      </div>

      <div class="sidebar-section">Operación</div>
      <nav class="nav" id="mainNav">
        <a href="#/dashboard"   data-route="dashboard"><span class="icn">▦</span> <span>Dashboard</span></a>
        <a href="#/inventario"  data-route="inventario"><span class="icn">⬢</span> <span>Inventario</span></a>
        <a href="#/proveedores" data-route="proveedores"><span class="icn">⚒</span> <span>Proveedores</span></a>
        <a href="#/ordenes"     data-route="ordenes"><span class="icn">✉</span> <span>Órdenes</span> <span class="badge" id="pendBadge"></span></a>
        <a href="#/facturacion" data-route="facturacion"><span class="icn">$</span> <span>Facturación</span></a>
      </nav>

      <div class="sidebar-section">Sistema</div>
      <nav class="nav" id="systemNav">
        <a href="#/usuarios" data-route="usuarios" data-require-role="admin"><span class="icn">👤</span> <span>Usuarios</span></a>
        <a href="#/ajustes"  data-route="ajustes"><span class="icn">⚙</span> <span>Ajustes</span></a>
      </nav>

      <div class="sidebar-section">Fase 2 (próximamente)</div>
      <nav class="nav">
        <a href="#" onclick="return false" style="opacity:.4; cursor:not-allowed;"><span class="icn">↗</span> <span>Ventas</span></a>
        <a href="#" onclick="return false" style="opacity:.4; cursor:not-allowed;"><span class="icn">↘</span> <span>Compras</span></a>
        <a href="#" onclick="return false" style="opacity:.4; cursor:not-allowed;"><span class="icn">▣</span> <span>Almacenes</span></a>
        <a href="#" onclick="return false" style="opacity:.4; cursor:not-allowed;"><span class="icn">◔</span> <span>Licitaciones</span></a>
        <a href="#" onclick="return false" style="opacity:.4; cursor:not-allowed;" title="Hornos y procesos que consumen insumos"><span class="icn">🔥</span> <span>Producción</span></a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="userAvatar">?</div>
          <div class="info">
            <div class="name" id="userName">—</div>
            <div class="role" id="userRole">—</div>
          </div>
          <button class="btn btn-icon btn-ghost" id="logoutBtn" title="Cerrar sesión">⎋</button>
        </div>
      </div>
    </aside>

    <header class="topbar">
      <div class="crumb">MGG · <strong id="crumbTitle">Dashboard</strong></div>
      <div class="top-actions">
        <div class="search-box">
          <input id="globalSearch" placeholder="Buscar productos, proveedores, órdenes…" />
        </div>
        <button class="notif-btn" id="notifBtn" title="Notificaciones">
          ◔<span class="dot" id="notifDot" style="display:none"></span>
        </button>
      </div>
    </header>

    <main class="main" id="view"></main>

  </div>

  <div class="toast-host" id="toastHost"></div>
  <div id="modalHost"></div>

  <!-- ──────────────────────────────────────────────────────────
       Monolito modular · orden de carga:
         1) shared/ (kernel)
         2) seed
         3) repositorios y vistas por módulo
         4) controllers
         5) entry de cada módulo
         6) main.js (bootstrap)
       ────────────────────────────────────────────────────────── -->

  <!-- Shared (kernel) -->
  <script src="../src/shared/store.js"></script>
  <script src="../src/shared/auth.js"></script>
  <script src="../src/shared/format.js"></script>
  <script src="../src/shared/ui.js"></script>
  <script src="../src/shared/config.js"></script>
  <script src="../src/shared/sound.js"></script>
  <!-- notifications usa Auth + Config + Sound (cargados arriba) -->
  <script src="../src/shared/notifications.js"></script>
  <script src="../src/shared/router.js"></script>

  <!-- Seed -->
  <script src="../src/seed/seed.js"></script>

  <!-- Módulos · repositorios + vistas + controllers + entry -->
  <script src="../src/modules/inventario/inventario.repository.js"></script>
  <!-- MovimientosRepo: bitácora del inventario (kardex). Único punto que toca productos.stock. -->
  <script src="../src/modules/inventario/movimientos.repository.js"></script>
  <!-- Restock depende de InventarioRepo + Config + Notify (cargados arriba) -->
  <script src="../src/shared/restock.js"></script>
  <script src="../src/modules/inventario/inventario.view.js"></script>
  <script src="../src/modules/inventario/inventario.module.js"></script>

  <script src="../src/modules/proveedores/proveedores.repository.js"></script>
  <script src="../src/modules/proveedores/proveedores.view.js"></script>
  <script src="../src/modules/proveedores/proveedores.module.js"></script>

  <script src="../src/modules/ordenes/ordenes.repository.js"></script>
  <script src="../src/modules/ordenes/ordenes.controller.js"></script>
  <script src="../src/modules/ordenes/ordenes.view.js"></script>
  <script src="../src/modules/ordenes/ordenes.module.js"></script>

  <script src="../src/modules/facturacion/facturacion.repository.js"></script>
  <script src="../src/modules/facturacion/facturacion.view.js"></script>
  <script src="../src/modules/facturacion/facturacion.module.js"></script>

  <script src="../src/modules/dashboard/dashboard.view.js"></script>
  <script src="../src/modules/dashboard/dashboard.module.js"></script>

  <!-- Sistema: usuarios + ajustes -->
  <script src="../src/modules/usuarios/usuarios.repository.js"></script>
  <script src="../src/modules/usuarios/usuarios.view.js"></script>
  <script src="../src/modules/usuarios/usuarios.module.js"></script>

  <script src="../src/modules/ajustes/ajustes.view.js"></script>
  <script src="../src/modules/ajustes/ajustes.module.js"></script>

  <!-- Bootstrap -->
  <script src="../src/main.js"></script>
</body>
</html>
